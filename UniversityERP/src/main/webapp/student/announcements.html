<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Announcements — Student</title><link rel="stylesheet" href="../css/style.css"></head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><h2>🎓 UniERP</h2><span>Student Portal</span></div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span>Dashboard</span></a>
      <a class="nav-item" href="assignments.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/></svg><span>Assignments</span></a>
      <a class="nav-item" href="materials.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/></svg><span>Materials</span></a>
      <a class="nav-item active" href="announcements.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/></svg><span>Announcements</span></a>
      <a class="nav-item" href="attendance.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/></svg><span>Attendance</span></a>
      <a class="nav-item" href="grades.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span>Grades</span></a>
    </nav>
    <div class="sidebar-footer"><a class="nav-item" href="#" onclick="logout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg><span>Logout</span></a></div>
  </aside>
  <main class="main">
    <header class="topbar">
      <span class="topbar-title">Announcements</span>
      <div class="topbar-right"><div class="avatar" id="user-avatar">S</div></div>
    </header>
    <div class="content">
      <div id="list"></div>
    </div>
  </main>
</div>
<script src="../js/app.js"></script>
<script>
(async () => {
  initSidebar();
  const student = await API.get('../api/students/me');
  document.getElementById('user-avatar').textContent = student.fname[0];
  const data = await API.get('../api/announcements');
  const container = document.getElementById('list');
  container.innerHTML = data.length === 0
    ? '<div class="card" style="text-align:center;padding:40px;color:#718096">No announcements yet</div>'
    : data.map(a => `
      <div class="card" style="margin-bottom:14px;border-left:4px solid ${a.targetRole==='all'?'#1a56db':a.targetRole==='student'?'#38a169':'#d69e2e'}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;flex-wrap:wrap;gap:8px">
          <div>
            <h3 style="font-size:15px;font-weight:600;margin-bottom:6px">${a.title}</h3>
            <span class="badge ${a.targetRole==='all'?'bg-blue':'bg-green'}">${a.targetRole === 'all' ? 'General' : 'Students'}</span>
            ${a.courseNo ? `<span class="badge bg-gray" style="margin-left:6px">${a.courseNo} — ${a.courseTitle}</span>` : ''}
          </div>
          <div style="text-align:right;font-size:12px;color:#718096">
            <div>${a.createdAt ? a.createdAt.substring(0,16) : ''}</div>
            <div>By: ${a.creatorName} (${a.creatorRole})</div>
          </div>
        </div>
        <p style="font-size:14px;color:#4a5568;line-height:1.7">${a.content}</p>
      </div>`).join('');
})();
</script>
</body>
</html>
