<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Attendance — Student</title><link rel="stylesheet" href="../css/style.css"></head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><h2>🎓 UniERP</h2><span>Student Portal</span></div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span>Dashboard</span></a>
      <a class="nav-item" href="courses.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg><span>Browse & Enroll</span></a>
      <a class="nav-item" href="assignments.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/></svg><span>Assignments</span></a>
      <a class="nav-item" href="materials.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/></svg><span>Materials</span></a>
      <a class="nav-item" href="announcements.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/></svg><span>Announcements</span></a>
      <a class="nav-item active" href="attendance.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg><span>Attendance</span></a>
      <a class="nav-item" href="grades.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span>Grades</span></a>
    </nav>
    <div class="sidebar-footer"><a class="nav-item" href="#" onclick="logout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg><span>Logout</span></a></div>
  </aside>
  <main class="main">
    <header class="topbar">
      <span class="topbar-title">My Attendance</span>
      <div class="topbar-right"><div class="avatar" id="user-avatar">S</div></div>
    </header>
    <div class="content">
      <div class="card">
        <div class="card-header"><span class="card-title">Attendance Summary by Course</span></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Course</th><th>Total Classes</th><th>Present</th><th>Absent</th><th>Late</th><th>Attendance %</th><th>Status</th></tr></thead>
            <tbody id="tbody"><tr><td colspan="7" style="text-align:center;padding:24px">Loading...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="../js/app.js"></script>
<script>
(async () => {
  initSidebar();
  const student = await API.get('../api/students/me');
  document.getElementById('user-avatar').textContent = student.fname[0];
  const data = await API.get('../api/attendance/student');
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = data.length === 0
    ? tableEmpty(7, 'No attendance records yet')
    : data.map(a => {
        const pct = a.percentage;
        const color = pct >= 75 ? '#276749' : pct >= 60 ? '#c05621' : '#c53030';
        const label = pct >= 75 ? 'Good' : pct >= 60 ? 'Low' : 'Critical';
        const badgeCls = pct >= 75 ? 'bg-green' : pct >= 60 ? 'bg-orange' : 'bg-red';
        return `<tr>
          <td><strong>${a.courseNo}</strong><br><span style="font-size:12px;color:#718096">${a.courseTitle}</span></td>
          <td>${a.total}</td>
          <td style="color:#276749;font-weight:600">${a.present}</td>
          <td style="color:#c53030;font-weight:600">${a.absent}</td>
          <td style="color:#c05621;font-weight:600">${a.late}</td>
          <td>
            <div style="display:flex;align-items:center;gap:8px">
              <div style="flex:1;background:#e2e8f0;border-radius:4px;height:8px">
                <div style="width:${pct}%;background:${color};height:8px;border-radius:4px"></div>
              </div>
              <strong style="color:${color};min-width:40px">${pct}%</strong>
            </div>
          </td>
          <td><span class="badge ${badgeCls}">${label}</span></td>
        </tr>`;
      }).join('');
})();
</script>
</body>
</html>
