<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>University ERP — Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div style="font-size:48px">🎓</div>
      <h1>University ERP</h1>
      <p>Registrar Management System</p>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@university.edu" autofocus>
    </div>
    <div class="form-group" style="margin-bottom:20px">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password"
             onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn btn-primary" style="width:100%;padding:13px" onclick="login()">Sign In</button>
    <p id="err" style="color:#e53e3e;font-size:13px;margin-top:14px;text-align:center;min-height:20px"></p>
    <div style="margin-top:20px;padding-top:16px;border-top:1px solid #e2e8f0;font-size:12px;color:#a0aec0;text-align:center">
      Demo: admin@university.edu / admin123<br>
      Faculty: priya@university.edu / faculty123<br>
      Student: rahul@university.edu / student123
    </div>
  </div>
</div>
<script>
async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const err = document.getElementById('err');
  err.textContent = '';
  if (!email || !password) { err.textContent = 'Please enter email and password'; return; }
  try {
    const params = new URLSearchParams({ email, password });
    const res = await fetch('auth', { method: 'POST', body: params });
    const data = await res.json();
    if (data.success) {
      window.location.href = data.redirect;
    } else {
      err.textContent = data.error || 'Login failed';
    }
  } catch(e) {
    err.textContent = 'Server error. Is Tomcat running?';
  }
}
</script>
</body>
</html>
