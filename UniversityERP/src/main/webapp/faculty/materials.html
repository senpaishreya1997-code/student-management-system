<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Study Materials — Faculty</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><h2>🎓 UniERP</h2><span>Faculty Portal</span></div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span>My Classes</span></a>
      <a class="nav-item" href="assignments.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span>Assignments</span></a>
      <a class="nav-item" href="attendance.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg><span>Attendance</span></a>
      <a class="nav-item active" href="materials.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg><span>Materials</span></a>
      <a class="nav-item" href="announcements.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg><span>Announcements</span></a>
      <a class="nav-item" href="grades.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span>Grades</span></a>
    </nav>
    <div class="sidebar-footer">
      <a class="nav-item" href="#" onclick="logout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg><span>Logout</span></a>
    </div>
  </aside>
  <main class="main">
    <header class="topbar">
      <span class="topbar-title">Study Materials</span>
      <div class="topbar-right">
        <button class="btn btn-primary btn-sm" onclick="showModal('add-modal')">+ Add Material</button>
        <div class="avatar" id="user-avatar">F</div>
      </div>
    </header>
    <div class="content">

      <div class="card" style="margin-bottom:16px">
        <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
          <label style="font-weight:500;font-size:14px">Filter by Course:</label>
          <select id="offering-filter" onchange="loadMaterials()" style="padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;outline:none;min-width:280px;flex:1">
            <option value="">— Loading... —</option>
          </select>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><span class="card-title">Uploaded Materials</span></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Title</th><th>Type</th><th>Description</th><th>Link/URL</th><th>Uploaded</th><th>Action</th></tr></thead>
            <tbody id="tbody"><tr><td colspan="6" style="text-align:center;padding:32px;color:#718096">Loading materials...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Add Material Modal -->
<div class="modal-overlay" id="add-modal" style="display:none" onclick="if(event.target===this)closeModal('add-modal')">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">Add Study Material</span><button class="modal-close" onclick="closeModal('add-modal')">×</button></div>
    <div class="form-grid">
      <div class="form-group form-full">
        <label>Course *</label>
        <select id="m-offering">
          <option value="">— Select course —</option>
        </select>
      </div>
      <div class="form-group form-full"><label>Title *</label><input id="m-title" placeholder="e.g. Chapter 3 Notes"></div>
      <div class="form-group">
        <label>Type</label>
        <select id="m-type">
          <option value="notes">📝 Notes</option>
          <option value="slides">📊 Slides</option>
          <option value="video">🎥 Video</option>
          <option value="link">🔗 Link</option>
          <option value="other">📁 Other</option>
        </select>
      </div>
      <div class="form-group"><label>URL / Link</label><input id="m-url" placeholder="https://..."></div>
      <div class="form-group form-full"><label>Description</label><textarea id="m-desc" rows="2" placeholder="Brief description..."></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('add-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="add()">Upload</button>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
const typeIcons = { notes:'📝', slides:'📊', video:'🎥', link:'🔗', other:'📁' };
let offerings = [];
let allMaterials = [];

async function init() {
  initSidebar();

  const inst = await API.get('../api/instructor/me');
  if (inst && inst.fname) {
    document.getElementById('user-avatar').textContent = inst.fname[0];
  }

  const data = await API.get('../api/courses/offerings/instructor/0');
  offerings = Array.isArray(data) ? data : [];

  const filterSel = document.getElementById('offering-filter');
  const modalSel  = document.getElementById('m-offering');

  if (offerings.length === 0) {
    filterSel.innerHTML = '<option value="">— No courses assigned —</option>';
    modalSel.innerHTML  = '<option value="">— No courses assigned —</option>';
    document.getElementById('tbody').innerHTML = tableEmpty(6, 'No courses assigned. Contact admin.');
    return;
  }

  const opts = offerings.map(o =>
    `<option value="${o.offeringId}">${o.courseNo} — ${o.courseTitle}</option>`
  ).join('');

  filterSel.innerHTML = '<option value="">— All my courses —</option>' + opts;
  modalSel.innerHTML  = opts;

  // Load all materials by default
  loadMaterials();
}

async function loadMaterials() {
  const offeringId = document.getElementById('offering-filter').value;
  let data;
  if (offeringId) {
    data = await API.get('../api/materials/offering/' + offeringId);
  } else {
    // Load materials for all my offerings
    data = [];
    for (const o of offerings) {
      const m = await API.get('../api/materials/offering/' + o.offeringId);
      if (Array.isArray(m)) {
        m.forEach(item => { item.courseNo = o.courseNo; item.courseTitle = o.courseTitle; });
        data = data.concat(m);
      }
    }
  }
  allMaterials = Array.isArray(data) ? data : [];
  render(allMaterials);
}

function render(data) {
  document.getElementById('tbody').innerHTML = data.length === 0
    ? tableEmpty(6, 'No materials uploaded yet. Click "+ Add Material" to add one.')
    : data.map(m => `<tr>
        <td>
          <strong>${m.title}</strong>
          ${m.courseNo ? `<br><span class="badge bg-blue" style="font-size:10px">${m.courseNo}</span>` : ''}
        </td>
        <td>${typeIcons[m.type] || '📁'} ${m.type}</td>
        <td style="font-size:12px;color:#718096;max-width:180px">${m.description || '—'}</td>
        <td>${m.url ? `<a href="${m.url}" target="_blank" style="color:var(--primary);font-size:13px">Open Link ↗</a>` : '—'}</td>
        <td style="font-size:12px">${m.uploadedAt ? m.uploadedAt.substring(0,10) : '—'}</td>
        <td><button class="btn btn-danger btn-sm" onclick="del(${m.materialId})">Delete</button></td>
      </tr>`).join('');
}

async function add() {
  const offeringId = document.getElementById('m-offering').value;
  const title = document.getElementById('m-title').value.trim();
  if (!offeringId) { toast('Select a course', 'error'); return; }
  if (!title)      { toast('Title is required', 'error'); return; }

  const res = await API.post('../api/materials', {
    offeringId: parseInt(offeringId),
    title,
    description: document.getElementById('m-desc').value,
    type: document.getElementById('m-type').value,
    url: document.getElementById('m-url').value
  });

  if (res.success) {
    toast('Material added! Students can now see it.');
    closeModal('add-modal');
    document.getElementById('m-title').value = '';
    document.getElementById('m-desc').value = '';
    document.getElementById('m-url').value = '';
    loadMaterials();
  } else {
    toast(res.error || 'Failed to add material', 'error');
  }
}

async function del(id) {
  if (!confirm('Delete this material? Students will no longer see it.')) return;
  const res = await API.delete('../api/materials/' + id);
  if (res.success) { toast('Deleted'); loadMaterials(); }
  else toast(res.error, 'error');
}

init();
</script>
</body>
</html>
