<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Announcements — Admin</title><link rel="stylesheet" href="../css/style.css"></head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><h2>🎓 UniERP</h2><span>Admin Portal</span></div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span>Dashboard</span></a>
      <a class="nav-item" href="students.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><span>Students</span></a>
      <a class="nav-item" href="courses.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/></svg><span>Courses</span></a>
      <a class="nav-item" href="offerings.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg><span>Offerings</span></a>
      <a class="nav-item" href="instructors.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Instructors</span></a>
      <a class="nav-item active" href="announcements.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/></svg><span>Announcements</span></a>
    </nav>
    <div class="sidebar-footer"><a class="nav-item" href="#" onclick="logout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg><span>Logout</span></a></div>
  </aside>
  <main class="main">
    <header class="topbar">
      <span class="topbar-title">Announcements</span>
      <div class="topbar-right">
        <button class="btn btn-primary btn-sm" onclick="showModal('add-modal')">+ New Announcement</button>
        <div class="avatar">A</div>
      </div>
    </header>
    <div class="content">
      <div id="list"></div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="add-modal" style="display:none" onclick="if(event.target===this)closeModal('add-modal')">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">Post Announcement</span><button class="modal-close" onclick="closeModal('add-modal')">×</button></div>
    <div class="form-grid">
      <div class="form-group form-full"><label>Title *</label><input id="a-title" placeholder="Announcement title"></div>
      <div class="form-group form-full"><label>Audience *</label>
        <select id="a-target">
          <option value="all">Everyone (students + faculty + admin)</option>
          <option value="student">Students only</option>
          <option value="instructor">Faculty only</option>
          <option value="admin_staff">Admin staff only</option>
        </select>
      </div>
      <div class="form-group form-full"><label>Message *</label><textarea id="a-content" rows="5" placeholder="Write your announcement..."></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('add-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="post()">Post Announcement</button>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
async function load() {
  initSidebar();
  const data = await API.get('../api/announcements');
  document.getElementById('list').innerHTML = data.length === 0
    ? '<div class="card" style="text-align:center;padding:40px;color:#718096">No announcements yet</div>'
    : data.map(a => `
      <div class="card" style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px">
          <div style="flex:1">
            <h3 style="font-size:15px;font-weight:600;margin-bottom:6px">${a.title}</h3>
            <span class="badge ${a.targetRole==='all'?'bg-blue':a.targetRole==='student'?'bg-green':a.targetRole==='instructor'?'bg-purple':'bg-orange'}">${a.targetRole}</span>
            ${a.courseNo ? `<span class="badge bg-gray" style="margin-left:6px">${a.courseNo}</span>` : ''}
            <p style="font-size:14px;color:#4a5568;margin-top:10px;line-height:1.7">${a.content}</p>
          </div>
          <div style="text-align:right;min-width:160px">
            <div style="font-size:12px;color:#718096">${a.createdAt ? a.createdAt.substring(0,16) : ''}</div>
            <div style="font-size:12px;color:#718096">By: ${a.creatorName}</div>
            <button class="btn btn-danger btn-sm" style="margin-top:8px" onclick="del(${a.announcementId})">Delete</button>
          </div>
        </div>
      </div>`).join('');
}

async function post() {
  const title = document.getElementById('a-title').value.trim();
  const content = document.getElementById('a-content').value.trim();
  if (!title || !content) { toast('Fill all fields','error'); return; }
  const res = await API.post('../api/announcements', {
    title, content, targetRole: document.getElementById('a-target').value, offeringId: -1
  });
  if (res.success) { toast('Announcement posted!'); closeModal('add-modal'); load(); }
  else toast(res.error,'error');
}

async function del(id) {
  if (!confirm('Delete this announcement?')) return;
  const res = await API.delete('../api/announcements/' + id);
  if (res.success) { toast('Deleted'); load(); }
  else toast(res.error,'error');
}
load();
</script>
</body>
</html>
