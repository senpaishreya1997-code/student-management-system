<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Offerings — Admin</title><link rel="stylesheet" href="../css/style.css"></head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><h2>🎓 UniERP</h2><span>Admin Portal</span></div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span>Dashboard</span></a>
      <a class="nav-item" href="students.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><span>Students</span></a>
      <a class="nav-item" href="courses.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg><span>Courses</span></a>
      <a class="nav-item active" href="offerings.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span>Offerings</span></a>
      <a class="nav-item" href="instructors.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Instructors</span></a>
      <a class="nav-item" href="announcements.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg><span>Announcements</span></a>
    </nav>
    <div class="sidebar-footer"><a class="nav-item" href="#" onclick="logout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg><span>Logout</span></a></div>
  </aside>
  <main class="main">
    <header class="topbar">
      <span class="topbar-title">Course Offerings</span>
      <div class="topbar-right">
        <button class="btn btn-primary" onclick="showModal('add-modal')">+ Add Offering</button>
        <div class="avatar">A</div>
      </div>
    </header>
    <div class="content">
      <div class="card">
        <div class="card-header"><span class="card-title">All Offerings (<span id="count">0</span>)</span></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Course</th><th>Credits</th><th>Section</th><th>Instructor</th><th>Semester</th><th>Classroom</th><th>Timings</th><th>Enrolled/Max</th><th>Actions</th></tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- Students in offering panel -->
      <div class="card" id="students-panel" style="display:none">
        <div class="card-header">
          <span class="card-title" id="students-panel-title">Enrolled Students</span>
          <button class="btn btn-outline btn-sm" onclick="document.getElementById('students-panel').style.display='none'">Close</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Enrollment No</th><th>Name</th><th>Grade</th><th>Status</th></tr></thead>
            <tbody id="students-panel-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="add-modal" style="display:none" onclick="if(event.target===this)closeModal('add-modal')">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">Add Course Offering</span><button class="modal-close" onclick="closeModal('add-modal')">×</button></div>
    <div class="form-grid">
      <div class="form-group form-full"><label>Course *</label><select id="a-course"></select></div>
      <div class="form-group form-full"><label>Instructor *</label><select id="a-inst"></select></div>
      <div class="form-group"><label>Year *</label><input type="number" id="a-year" value="2024" min="2020" max="2030"></div>
      <div class="form-group"><label>Semester *</label><select id="a-sem"><option value="I">Semester I</option><option value="II">Semester II</option><option value="Summer">Summer</option></select></div>
      <div class="form-group"><label>Section No *</label><input id="a-sec" placeholder="e.g. A"></div>
      <div class="form-group"><label>Max Students</label><input type="number" id="a-max" value="60"></div>
      <div class="form-group"><label>Classroom</label><input id="a-room" placeholder="e.g. Room 101"></div>
      <div class="form-group"><label>Timings</label><input id="a-time" placeholder="e.g. Mon-Wed 9:00-10:30"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('add-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="add()">Add Offering</button>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal" style="display:none" onclick="if(event.target===this)closeModal('edit-modal')">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">Edit Offering</span><button class="modal-close" onclick="closeModal('edit-modal')">×</button></div>
    <input type="hidden" id="e-id">
    <div class="form-grid">
      <div class="form-group form-full"><label>Course *</label><select id="e-course"></select></div>
      <div class="form-group form-full"><label>Instructor *</label><select id="e-inst"></select></div>
      <div class="form-group"><label>Year *</label><input type="number" id="e-year" min="2020" max="2030"></div>
      <div class="form-group"><label>Semester *</label><select id="e-sem"><option value="I">Semester I</option><option value="II">Semester II</option><option value="Summer">Summer</option></select></div>
      <div class="form-group"><label>Section No *</label><input id="e-sec"></div>
      <div class="form-group"><label>Max Students</label><input type="number" id="e-max"></div>
      <div class="form-group"><label>Classroom</label><input id="e-room"></div>
      <div class="form-group"><label>Timings</label><input id="e-time"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('edit-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="update()">Save Changes</button>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
let courses = [], instructors = [];

async function load() {
  const [offerings, c, inst] = await Promise.all([
    API.get('../api/courses/offerings'),
    API.get('../api/courses'),
    API.get('../api/courses/instructors')
  ]);
  courses = c; instructors = inst;

  ['a-course','e-course'].forEach(id => {
    document.getElementById(id).innerHTML = courses.map(c =>
      `<option value="${c.courseId}">${c.courseNo} — ${c.title} (${c.credits} cr)</option>`).join('');
  });
  ['a-inst','e-inst'].forEach(id => {
    document.getElementById(id).innerHTML = instructors.map(i =>
      `<option value="${i.instructorId}">${i.name} (${i.title||''})</option>`).join('');
  });

  document.getElementById('count').textContent = offerings.length;
  document.getElementById('tbody').innerHTML = offerings.length === 0 ? tableEmpty(9) :
    offerings.map(o => `<tr>
      <td><strong>${o.courseNo}</strong><br><span style="color:#718096;font-size:11px">${o.courseTitle}</span></td>
      <td>${o.credits}</td>
      <td>Sec ${o.sectionNo}</td>
      <td>${o.instructorName}</td>
      <td>Sem ${o.semester} ${o.year}</td>
      <td>${o.classroom||'—'}</td>
      <td style="font-size:12px">${o.timings||'—'}</td>
      <td>
        <button class="btn btn-outline btn-sm" onclick="viewStudents(${o.offeringId},'${o.courseTitle.replace(/'/g,"\\'")}')">
          <span class="badge bg-blue">${o.enrolledCount}/${o.maxStudents}</span>
        </button>
      </td>
      <td style="display:flex;gap:4px;flex-wrap:wrap">
        <button class="btn btn-outline btn-sm" onclick='openEdit(${JSON.stringify(o)})'>Edit</button>
        <button class="btn btn-danger btn-sm" onclick="del(${o.offeringId})">Delete</button>
      </td>
    </tr>`).join('');
}

function openEdit(o) {
  document.getElementById('e-id').value = o.offeringId;
  document.getElementById('e-course').value = o.courseId;
  document.getElementById('e-inst').value = o.instructorId;
  document.getElementById('e-year').value = o.year;
  document.getElementById('e-sem').value = o.semester;
  document.getElementById('e-sec').value = o.sectionNo;
  document.getElementById('e-max').value = o.maxStudents;
  document.getElementById('e-room').value = o.classroom || '';
  document.getElementById('e-time').value = o.timings || '';
  showModal('edit-modal');
}

async function update() {
  const id = parseInt(document.getElementById('e-id').value);
  const sec = document.getElementById('e-sec').value.trim();
  if (!sec) { toast('Section No required', 'error'); return; }
  const res = await API.put('../api/courses/offerings/' + id, {
    courseId: parseInt(document.getElementById('e-course').value),
    instructorId: parseInt(document.getElementById('e-inst').value),
    year: parseInt(document.getElementById('e-year').value),
    semester: document.getElementById('e-sem').value,
    sectionNo: sec,
    classroom: document.getElementById('e-room').value,
    timings: document.getElementById('e-time').value,
    maxStudents: parseInt(document.getElementById('e-max').value) || 60
  });
  if (res.success) { toast('Offering updated!'); closeModal('edit-modal'); load(); }
  else toast(res.error || 'Update failed', 'error');
}

async function viewStudents(offeringId, title) {
  document.getElementById('students-panel').style.display = 'block';
  document.getElementById('students-panel-title').textContent = 'Students in: ' + title;
  const data = await API.get('../api/enrollments/offering/' + offeringId);
  document.getElementById('students-panel-tbody').innerHTML = data.length === 0
    ? tableEmpty(4, 'No students enrolled yet')
    : data.map(s => `<tr>
        <td>${s.enrollmentNo}</td>
        <td><strong>${s.studentName}</strong></td>
        <td><span class="grade-big ${gradeClass(s.grade)}">${s.grade || '—'}</span></td>
        <td>${statusBadge(s.status)}</td>
      </tr>`).join('');
  document.getElementById('students-panel').scrollIntoView({ behavior: 'smooth' });
}

async function add() {
  const sec = document.getElementById('a-sec').value.trim();
  if (!sec) { toast('Section No required','error'); return; }
  const res = await API.post('../api/courses/offerings', {
    courseId: parseInt(document.getElementById('a-course').value),
    instructorId: parseInt(document.getElementById('a-inst').value),
    year: parseInt(document.getElementById('a-year').value),
    semester: document.getElementById('a-sem').value,
    sectionNo: sec,
    classroom: document.getElementById('a-room').value,
    timings: document.getElementById('a-time').value,
    maxStudents: parseInt(document.getElementById('a-max').value) || 60
  });
  if (res.success) { toast('Offering added!'); closeModal('add-modal'); load(); }
  else toast(res.error,'error');
}

async function del(id) {
  if (!confirm('Delete this offering? All student enrollments will be removed.')) return;
  const res = await API.delete('../api/courses/offerings/' + id);
  if (res.success) { toast('Deleted'); load(); }
  else toast(res.error,'error');
}

load(); initSidebar();
</script>
</body>
</html>
