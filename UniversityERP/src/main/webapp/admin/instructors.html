<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Instructors — Admin</title><link rel="stylesheet" href="../css/style.css"></head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><h2>🎓 UniERP</h2><span>Admin Portal</span></div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span>Dashboard</span></a>
      <a class="nav-item" href="students.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><span>Students</span></a>
      <a class="nav-item" href="courses.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg><span>Courses</span></a>
      <a class="nav-item" href="offerings.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span>Offerings</span></a>
      <a class="nav-item active" href="instructors.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Instructors</span></a>
      <a class="nav-item" href="announcements.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg><span>Announcements</span></a>
    </nav>
    <div class="sidebar-footer"><a class="nav-item" href="#" onclick="logout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg><span>Logout</span></a></div>
  </aside>
  <main class="main">
    <header class="topbar">
      <span class="topbar-title">Instructor Management</span>
      <div class="topbar-right">
        <button class="btn btn-primary" onclick="showModal('add-modal')">+ Add Instructor</button>
        <div class="avatar">A</div>
      </div>
    </header>
    <div class="content">
      <div class="card">
        <div class="card-header"><span class="card-title">All Instructors (<span id="count">0</span>)</span></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Name</th><th>Email</th><th>Title</th><th>Department</th><th>Experience</th><th>Actions</th></tr></thead>
            <tbody id="tbody"><tr><td colspan="6" style="text-align:center;padding:24px">Loading...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="add-modal" style="display:none" onclick="if(event.target===this)closeModal('add-modal')">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">Add New Instructor</span><button class="modal-close" onclick="closeModal('add-modal')">×</button></div>
    <div class="form-grid">
      <div class="form-group"><label>First Name *</label><input id="a-fname" placeholder="e.g. Priya"></div>
      <div class="form-group"><label>Last Name *</label><input id="a-lname" placeholder="e.g. Sharma"></div>
      <div class="form-group"><label>Email *</label><input type="email" id="a-email" placeholder="faculty@university.edu"></div>
      <div class="form-group"><label>Phone</label><input id="a-phone"></div>
      <div class="form-group"><label>Title</label><select id="a-title"><option>Professor</option><option>Associate Professor</option><option>Assistant Professor</option><option>Lecturer</option></select></div>
      <div class="form-group"><label>Department</label><select id="a-dept"></select></div>
      <div class="form-group"><label>Experience (years)</label><input type="number" id="a-exp" value="0" min="0"></div>
      <div class="form-group"><label>Salary</label><input type="number" id="a-sal" value="60000"></div>
      <div class="form-group"><label>Join Date</label><input type="date" id="a-join" value="2024-01-01"></div>
      <div class="form-group"><label>Initial Password *</label><input type="password" id="a-pwd" placeholder="Faculty login password"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('add-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="add()">Add Instructor</button>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal" style="display:none" onclick="if(event.target===this)closeModal('edit-modal')">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">Edit Instructor</span><button class="modal-close" onclick="closeModal('edit-modal')">×</button></div>
    <input type="hidden" id="e-id">
    <div class="form-grid">
      <div class="form-group"><label>First Name *</label><input id="e-fname"></div>
      <div class="form-group"><label>Last Name *</label><input id="e-lname"></div>
      <div class="form-group"><label>Phone</label><input id="e-phone"></div>
      <div class="form-group"><label>Title</label><select id="e-title"><option>Professor</option><option>Associate Professor</option><option>Assistant Professor</option><option>Lecturer</option></select></div>
      <div class="form-group"><label>Department</label><select id="e-dept"></select></div>
      <div class="form-group"><label>Experience (years)</label><input type="number" id="e-exp" min="0"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('edit-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="update()">Save Changes</button>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
let depts = [];

async function load() {
  const [instructors, d] = await Promise.all([
    API.get('../api/admin/instructors'),
    API.get('../api/courses/departments')
  ]);
  depts = d;
  ['a-dept','e-dept'].forEach(id => {
    document.getElementById(id).innerHTML = depts.map(dep =>
      `<option value="${dep.deptId}">${dep.deptName}</option>`).join('');
  });
  document.getElementById('count').textContent = instructors.length;
  document.getElementById('tbody').innerHTML = instructors.length === 0 ? tableEmpty(6) :
    instructors.map(i => `<tr>
      <td><strong>${i.fname} ${i.lname}</strong></td>
      <td style="font-size:12px;color:#718096">${i.email}</td>
      <td><span class="badge bg-blue">${i.title||'—'}</span></td>
      <td>${i.deptName||'—'}</td>
      <td>${i.experienceYears} yrs</td>
      <td style="display:flex;gap:6px">
        <button class="btn btn-outline btn-sm" onclick='openEdit(${JSON.stringify(i)})'>Edit</button>
        <button class="btn btn-danger btn-sm" onclick="del(${i.instructorId},'${(i.fname+' '+i.lname).replace(/'/g,"\\'")}')">Delete</button>
      </td>
    </tr>`).join('');
}

function openEdit(i) {
  document.getElementById('e-id').value = i.instructorId;
  document.getElementById('e-fname').value = i.fname;
  document.getElementById('e-lname').value = i.lname;
  document.getElementById('e-phone').value = i.phone || '';
  document.getElementById('e-title').value = i.title || 'Lecturer';
  document.getElementById('e-dept').value = i.deptId;
  document.getElementById('e-exp').value = i.experienceYears || 0;
  showModal('edit-modal');
}

async function update() {
  const id = parseInt(document.getElementById('e-id').value);
  const fname = document.getElementById('e-fname').value.trim();
  const lname = document.getElementById('e-lname').value.trim();
  if (!fname || !lname) { toast('Name is required', 'error'); return; }
  const res = await API.put('../api/admin/instructors/' + id, {
    fname, lname,
    phone: document.getElementById('e-phone').value,
    title: document.getElementById('e-title').value,
    deptId: document.getElementById('e-dept').value,
    experience: document.getElementById('e-exp').value
  });
  if (res.success) { toast('Instructor updated!'); closeModal('edit-modal'); load(); }
  else toast(res.error || 'Update failed', 'error');
}

async function add() {
  const fname=document.getElementById('a-fname').value.trim();
  const lname=document.getElementById('a-lname').value.trim();
  const email=document.getElementById('a-email').value.trim();
  const pwd=document.getElementById('a-pwd').value;
  if (!fname||!lname||!email||!pwd) { toast('Fill required fields','error'); return; }
  const res = await API.post('../api/admin/instructors', {
    fname, lname, email,
    phone:document.getElementById('a-phone').value,
    title:document.getElementById('a-title').value,
    deptId:document.getElementById('a-dept').value,
    experience:document.getElementById('a-exp').value,
    salary:document.getElementById('a-sal').value,
    joinDate:document.getElementById('a-join').value,
    password:pwd
  });
  if (res.success) { toast('Instructor added!'); closeModal('add-modal'); load(); }
  else toast(res.error,'error');
}

async function del(id, name) {
  if (!confirm('Delete "'+name+'"? This will also remove their course offerings.')) return;
  const res = await API.delete('../api/admin/instructors/'+id);
  if (res.success) { toast('Instructor deleted'); load(); }
  else toast(res.error||'Cannot delete — may have active offerings','error');
}

load(); initSidebar();
</script>
</body>
</html>
